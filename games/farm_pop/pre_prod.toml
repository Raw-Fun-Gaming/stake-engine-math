# Pre-production Configuration for farm_pop Game
# Smaller simulations with full pipeline for quick verification (~1 min)

# Target modes for optimization
target_modes = ["base", "ante-2x", "ante-5x", "ante-10x", "bonus", "super"]

[execution]
num_threads = 10
rust_threads = 20
batching_size = 10000
compression = true
profiling = false

[simulation]
base = 10000
"ante-2x" = 10000
"ante-5x" = 10000
"ante-10x" = 10000
bonus = 10000
super = 10000

[pipeline]
run_sims = true
run_optimization = true
run_analysis = true
run_format_checks = true

[analysis]
custom_keys = [{ symbol = "scatter" }]
